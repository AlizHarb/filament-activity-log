name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        include:
          # v4 lane: PHP 8.3 + Spatie v4
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            spatie: '^4.0'
            dependency-version: prefer-stable
            os: ubuntu-latest
          # v4 lane: PHP 8.4 + Spatie v4
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            spatie: '^4.0'
            dependency-version: prefer-stable
            os: ubuntu-latest
          # v5 lane: PHP 8.4 + Spatie v5
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            spatie: '^5.0'
            dependency-version: prefer-stable
            os: ubuntu-latest

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - Spatie ${{ matrix.spatie }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        env:
          SPATIE_VERSION: ${{ matrix.spatie }}
          DEP_VERSION: ${{ matrix.dependency-version }}
        run: |
          composer require "spatie/laravel-activitylog:${SPATIE_VERSION}" --no-interaction --no-update
          composer update --${DEP_VERSION} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest
